name: Update Intelligence Index

on:
  schedule:
    # 08:00 UTC cada día (10:00 CEST en España)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      sections:
        description: 'Secciones a capturar (coma; vacío = todas)'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run (no escribir archivos)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: update-intelligence-index
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-scripts.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-scripts.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Fetch Intelligence Index
        run: |
          python scripts/fetch_intelligence_index.py \
            --verbose \
            ${{ github.event.inputs.sections && format('--sections {0}', github.event.inputs.sections) || '' }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Build auto catalog
        run: |
          python scripts/build_auto_catalog.py \
            --verbose \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Detect changes
        id: changes
        if: github.event.inputs.dry_run != 'true'
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No hay cambios para commitear."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit & push
        if: steps.changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "chore(intelligence-index): daily update $DATE"
          git push

      - name: Set date
        id: date
        run: echo "today=$(date -u +"%Y-%m-%d")" >> "$GITHUB_OUTPUT"

      - name: Upload raw payloads artifact
        if: always() && github.event.inputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: raw-${{ steps.date.outputs.today }}-${{ github.run_id }}
          path: data/raw/
          retention-days: 14
          if-no-files-found: ignore
